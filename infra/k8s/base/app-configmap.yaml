apiVersion: v1
kind: ConfigMap
metadata:
  name: app-config
data:
  APP_NAME: Character Battle
  APP_VERSION: "0.1.0"
  API_PREFIX: /api
  DATABASE_AUTO_CREATE: "true"
  DATABASE_ECHO: "false"
  DB_POOL_SIZE: "5"
  DB_MAX_OVERFLOW: "10"
  DB_POOL_TIMEOUT: "30"
  DB_POOL_RECYCLE_SECONDS: "1800"
  REDIS_URL: redis://redis:6379/0
  SESSION_COOKIE_NAME: anon_session
  SESSION_TTL_SECONDS: "2592000"
  SESSION_COOKIE_SECURE: "false"
  MAX_CHARACTERS_PER_USER: "5"
  MAX_CHARACTER_NAME_LENGTH: "20"
  MAX_CHARACTER_DESCRIPTION_LENGTH: "255"
  LEADERBOARD_ZSET_KEY: leaderboard:characters
  LEADERBOARD_LAST_WIN_KEY: leaderboard:characters:last_win
  LEADERBOARD_WIN_POINTS: "1"
  VECTOR_SEARCH_ENABLED: "false"
  OPENAI_MODEL: gpt-4o
  LLM_MAX_ATTEMPTS: "3"
